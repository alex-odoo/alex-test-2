<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2235"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC300"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E65C00"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Terminal body -->
  <rect x="44" y="38" width="112" height="84" rx="14" fill="url(#g1)"/>
  <!-- Screen -->
  <rect x="54" y="48" width="92" height="54" rx="8" fill="#1B1C2E" opacity="0.85"/>
  <!-- Screen content bars -->
  <rect x="62" y="58" width="50" height="7" rx="3" fill="url(#g1)" opacity="0.7"/>
  <rect x="62" y="70" width="38" height="7" rx="3" fill="url(#g1)" opacity="0.5"/>
  <rect x="118" y="60" width="20" height="18" rx="4" fill="url(#g2)" opacity="0.8"/>
  <!-- Stand/neck -->
  <rect x="88" y="122" width="24" height="18" rx="4" fill="url(#g1)" opacity="0.7"/>
  <!-- Base -->
  <rect x="54" y="140" width="92" height="16" rx="8" fill="url(#g2)"/>
  <!-- Keypad dots -->
  <circle cx="74" cy="105" r="5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="105" r="5" fill="white" opacity="0.5"/>
  <circle cx="126" cy="105" r="5" fill="white" opacity="0.5"/>
  <!-- Card slot -->
  <rect x="52" y="164" width="96" height="8" rx="4" fill="url(#g1)" opacity="0.3"/>
