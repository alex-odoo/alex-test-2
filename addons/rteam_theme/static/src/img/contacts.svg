  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Card -->
  <rect x="28" y="42" width="144" height="116" rx="16" fill="url(#g1)" opacity="0.2"/>
  <rect x="28" y="42" width="144" height="116" rx="16" stroke="url(#g1)" stroke-width="3" fill="none"/>
