  <rect x="28" y="142" width="144" height="16" rx="0" style="rx: 0 0 16 16" fill="url(#g1)" opacity="0.2"/>
  <path d="M28,142 L172,142 L172,158 Q172,158 172,158 L28,158 Q28,158 28,158 Z" rx="16" fill="url(#g1)" opacity="0.2"/>
