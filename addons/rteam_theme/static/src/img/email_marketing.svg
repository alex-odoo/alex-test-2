<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2235"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Paper plane -->
  <polygon points="24,160 176,76 108,168" fill="url(#g1)" opacity="0.3"/>
  <polygon points="24,160 176,76 52,112" fill="url(#g2)" opacity="0.7"/>
  <polygon points="24,160 176,76 108,168 52,112" fill="url(#g1)"/>
  <!-- Fold line -->
  <line x1="52" y1="112" x2="108" y2="168" stroke="url(#g2)" stroke-width="4" opacity="0.6"/>
  <!-- Speed lines -->
  <line x1="24" y1="80" x2="76" y2="80" stroke="url(#g1)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="96" x2="78" y2="96" stroke="url(#g1)" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <line x1="48" y1="112" x2="80" y2="112" stroke="url(#g1)" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
</svg>
