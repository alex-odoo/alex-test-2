  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Clipboard -->
  <rect x="36" y="46" width="128" height="118" rx="14" fill="url(#g1)" opacity="0.25"/>
  <!-- Lines -->
  <rect x="52" y="78" width="72" height="10" rx="5" fill="url(#g1)" opacity="0.6"/>
  <rect x="52" y="102" width="56" height="10" rx="5" fill="url(#g1)" opacity="0.5"/>
  <rect x="52" y="126" width="64" height="10" rx="5" fill="url(#g1)" opacity="0.4"/>
  <!-- Big checkmark circle -->
