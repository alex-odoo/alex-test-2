<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2235"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#E74C3C"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC300"/>
      <stop offset="100%" stop-color="#FF5733"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Bars -->
  <rect x="30" y="114" width="30" height="44" rx="8" fill="url(#g1)" opacity="0.6"/>
  <rect x="72" y="88" width="30" height="70" rx="8" fill="url(#g1)" opacity="0.75"/>
  <rect x="114" y="62" width="30" height="96" rx="8" fill="url(#g2)"/>
  <!-- Trend arrow up -->
  <polyline points="36,108 78,82 120,58 162,34" stroke="white" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
  <polygon points="162,34 148,38 154,52" fill="white" opacity="0.85"/>
  <!-- Floor line -->
  <rect x="22" y="158" width="156" height="4" rx="2" fill="white" opacity="0.15"/>
</svg>
