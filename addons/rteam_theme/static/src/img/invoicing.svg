<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2235"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F39C12"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC300"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Big percent / slash symbol -->
  <line x1="72" y1="136" x2="128" y2="64" stroke="url(#g1)" stroke-width="14"
        stroke-linecap="round"/>
  <circle cx="78" cy="70" r="20" fill="none" stroke="url(#g2)" stroke-width="13"/>
  <circle cx="122" cy="130" r="20" fill="none" stroke="url(#g2)" stroke-width="13"/>
  <!-- Coin circle background -->
  <circle cx="100" cy="100" r="66" fill="url(#g1)" opacity="0.08"/>
</svg>
