[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Proxy mode — required when behind Nginx
proxy_mode = True

; Workers (set to 0 to use threaded mode instead of multiprocessing)
; For CX22 (2 vCPU / 4 GB RAM) — 2 workers is appropriate
workers = 2
max_cron_threads = 1

; Memory limits (bytes) — tuned for 4 GB RAM
limit_memory_soft = 1342177280
limit_memory_hard = 1610612736

; Request limits
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120
